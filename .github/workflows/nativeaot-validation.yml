name: NativeAOT Build Validation

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Enable Automated Test Report Artifact Upload
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
          core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

    - name: Run tests
      run: dotnet test --project tests/Ollama.TUI.Tests/Ollama.TUI.Tests.csproj

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Install dotnet-releaser
      run: dotnet tool install --global dotnet-releaser

    - name: Build Linux packages
      shell: bash
      run: dotnet-releaser build --github-token "${{ secrets.GITHUB_TOKEN }}" dotnet-releaser.toml

    - name: Upload Linux packages
      uses: actions/upload-artifact@v7
      with:
        name: ollama-tui-packages-linux
        path: artifacts-dotnet-releaser/
        retention-days: 7

  build-macos:
    needs: test
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Install dotnet-releaser
      run: dotnet tool install --global dotnet-releaser

    - name: Build macOS packages
      shell: bash
      run: dotnet-releaser build --github-token "${{ secrets.GITHUB_TOKEN }}" dotnet-releaser.macos.toml

    - name: Upload macOS packages
      uses: actions/upload-artifact@v7
      with:
        name: ollama-tui-packages-macos
        path: artifacts-dotnet-releaser/
        retention-days: 7

  build-windows:
    needs: test
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish as NativeAOT
      run: dotnet publish src/Ollama.TUI/Ollama.TUI.csproj --configuration Release --no-restore --no-build -o ./nativeaot-publish

    - name: Verify NativeAOT executable
      run: test -f ./nativeaot-publish/Ollama.TUI.exe
      shell: bash

    - name: Install InnoSetup
      run: choco install innosetup -y --no-progress

    - name: Build Windows installer
      run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\Ollama-TUI.iss'
      shell: pwsh

    - name: Upload Windows installer artifact
      uses: actions/upload-artifact@v7
      with:
        name: ollama-tui-installer-windows
        path: ./installer-output/
        retention-days: 7