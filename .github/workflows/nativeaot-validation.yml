name: NativeAOT Build Validation

on:
  push:

jobs:
  nativeaot-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish as NativeAOT
      run: dotnet publish src/Ollama.TUI/Ollama.TUI.csproj --configuration Release --no-restore --no-build -o ./nativeaot-publish

    - name: Verify NativeAOT executable
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          test -f ./nativeaot-publish/Ollama.TUI.exe
        else
          test -f ./nativeaot-publish/Ollama.TUI
        fi
      shell: bash

    - name: Upload NativeAOT artifacts (Linux & macOS)
      if: runner.os != 'Windows'
      uses: actions/upload-artifact@v7
      with:
        name: ollama-tui-nativeaot-${{ matrix.os }}
        path: ./nativeaot-publish/
        retention-days: 7

    - name: Install InnoSetup (Windows only)
      if: runner.os == 'Windows'
      run: choco install innosetup -y --no-progress

    - name: Build Windows installer
      if: runner.os == 'Windows'
      run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\Ollama-TUI.iss'
      shell: pwsh

    - name: Upload Windows installer artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v7
      with:
        name: ollama-tui-installer-windows
        path: ./installer-output/
        retention-days: 7