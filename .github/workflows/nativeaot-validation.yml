name: NativeAOT Build Validation

on:
  push:

jobs:
  nativeaot-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish as NativeAOT
      run: dotnet publish src/Ollama.TUI/Ollama.TUI.csproj --configuration Release --no-restore --no-build -o ./nativeaot-publish

    - name: Verify NativeAOT executable
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          test -f ./nativeaot-publish/Ollama.TUI.exe
        else
          test -f ./nativeaot-publish/Ollama.TUI
        fi
      shell: bash

    - name: Upload NativeAOT artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ollama-tui-nativeaot-${{ matrix.os }}
        path: ./nativeaot-publish/
        retention-days: 7