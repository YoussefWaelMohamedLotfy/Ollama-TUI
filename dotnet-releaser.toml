# dotnet-releaser configuration for Linux packages
profile = "custom"

[msbuild]
project = "src/Ollama.TUI/Ollama.TUI.csproj"

[msbuild.properties]
PublishReadyToRun = false
PublishSingleFile = false

[github]
user = "YoussefWaelMohamedLotfy"
repo = "Ollama-TUI"

[nuget]
publish = false

[brew]
publish = false

[test]
enable = false

[[pack]]
rid = ["linux-x64"]
kinds = ["deb", "tar"]
